<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0;padding:0;background-color:#060611;font-family:'Pretendard Variable','Noto Sans KR',sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#060611;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color:#151920;border-radius:16px;border:1px solid #252d3a;padding:40px 32px;">

          <!-- Badge -->
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <span style="display:inline-block;background:rgba(79,156,255,0.12);border:1px solid rgba(79,156,255,0.25);color:#4f9cff;font-size:12px;font-weight:600;letter-spacing:0.5px;padding:6px 14px;border-radius:20px;">
                KNOCK 병원 마케팅 시스템
              </span>
            </td>
          </tr>

          <!-- Title -->
          <tr>
            <td align="center" style="padding-bottom:12px;">
              <h1 style="margin:0;font-size:24px;font-weight:700;color:#e8eaf0;">
                계정이 생성되었습니다
              </h1>
            </td>
          </tr>

          <!-- Description -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <p style="margin:0;font-size:15px;line-height:1.6;color:#8b95a5;">
                노크 병원 마케팅 시스템에 초대되었습니다.<br/>
                아래 버튼을 클릭하여 비밀번호를 설정하고<br/>
                대시보드를 시작하세요.
              </p>
            </td>
          </tr>

          <!-- CTA Button -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <a href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=invite"
                 style="display:inline-block;background:linear-gradient(135deg,#4f9cff,#6366f1);color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;padding:14px 40px;border-radius:10px;letter-spacing:0.3px;">
                비밀번호 설정하기
              </a>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding-bottom:24px;">
              <hr style="border:none;border-top:1px solid #252d3a;margin:0;" />
            </td>
          </tr>

          <!-- Help text -->
          <tr>
            <td align="center" style="padding-bottom:16px;">
              <p style="margin:0;font-size:13px;line-height:1.6;color:#6e7a8d;">
                버튼이 작동하지 않으면 아래 링크를 브라우저에 붙여넣으세요:
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <p style="margin:0;font-size:12px;line-height:1.5;color:#4f9cff;word-break:break-all;">
                {{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&amp;type=invite
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center">
              <p style="margin:0;font-size:12px;color:#6e7a8d;">
                본 메일은 관리자에 의해 발송되었습니다.<br/>
                본인이 요청하지 않았다면 이 메일을 무시해 주세요.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
